<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Luna App 界面预览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAF7F2"/>
      <stop offset="0.55" stop-color="#FFF9F5"/>
      <stop offset="1" stop-color="#F1ECE3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="24" flood-color="#3A2A20" flood-opacity="0.18"/>
    </filter>
    <style>
      .meta { font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 2.2px; fill: #7A7068; }
      .title { font: 600 42px Georgia, 'Times New Roman', serif; fill: #2E2A26; }
      .big { font: 800 72px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #C5634A; }
      .h2 { font: 700 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #2E2A26; }
      .body { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #2E2A26; }
      .muted { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #7A7068; }
      .tiny { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: 1.5px; fill: #7A7068; }
      .phone { fill: #1F1A17; }
      .screen { fill: #FAF7F2; }
      .card { fill: #FDFBF7; stroke: #E6DED1; stroke-width: 1.5; }
      .accent { fill: #C5634A; }
      .accentSoft { fill: #E8A48E; }
      .ovulation { fill: #B8794A; }
      .line { stroke: #E6DED1; stroke-width: 1.5; }
      .ringBg { stroke: #F1ECE3; stroke-width: 18; stroke-linecap: round; }
      .ringAccent { stroke: #C5634A; stroke-width: 18; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1380" cy="88" r="180" fill="#E8A48E" opacity="0.16"/>
  <circle cx="180" cy="820" r="230" fill="#C5634A" opacity="0.08"/>

  <text x="96" y="94" class="meta">LOCAL FIRST · PRIVATE CYCLE TRACKER</text>
  <text x="96" y="154" class="title">Luna</text>
  <text x="96" y="204" class="body">温柔、私密、无账号的月经周期追踪 App。</text>
  <text x="96" y="238" class="muted">记录经期、心情与症状，查看日历预测与周期洞察，并用本地提醒照顾每一天。</text>

  <g transform="translate(80 300)">
    <rect x="0" y="0" width="300" height="92" rx="24" class="card"/>
    <circle cx="46" cy="46" r="18" class="accent" opacity="0.9"/>
    <text x="82" y="38" class="h2">本地优先</text>
    <text x="82" y="64" class="muted">数据只留在手机上</text>
  </g>
  <g transform="translate(80 414)">
    <rect x="0" y="0" width="300" height="92" rx="24" class="card"/>
    <circle cx="46" cy="46" r="18" class="accentSoft" opacity="0.9"/>
    <text x="82" y="38" class="h2">周期预测</text>
    <text x="82" y="64" class="muted">经期与排卵窗口一眼看懂</text>
  </g>
  <g transform="translate(80 528)">
    <rect x="0" y="0" width="300" height="92" rx="24" class="card"/>
    <circle cx="46" cy="46" r="18" class="ovulation" opacity="0.9"/>
    <text x="82" y="38" class="h2">温和提醒</text>
    <text x="82" y="64" class="muted">WorkManager 本地通知</text>
  </g>

  <!-- 今日 -->
  <g transform="translate(450 132)" filter="url(#shadow)">
    <rect width="250" height="560" rx="38" class="phone"/>
    <rect x="12" y="12" width="226" height="536" rx="30" class="screen"/>
    <rect x="90" y="24" width="70" height="7" rx="4" fill="#2E2A26" opacity="0.35"/>
    <g transform="translate(32 56)">
      <text class="meta">TODAY'S CYCLE</text>
      <text y="43" class="title">Luna</text>
      <rect x="134" y="5" width="76" height="28" rx="14" fill="#F4D8CF"/>
      <text x="150" y="24" class="tiny" fill="#C5634A">黄体期</text>
      <circle cx="112" cy="164" r="78" fill="none" class="ringBg"/>
      <path d="M112 86 A78 78 0 1 1 58 220" fill="none" class="ringAccent"/>
      <text x="86" y="171" class="big">7</text>
      <text x="65" y="198" class="muted">天后下次经期</text>
      <rect x="0" y="278" width="186" height="60" rx="18" class="card"/>
      <text x="18" y="315" class="body">🍂  适当放松</text>
      <rect x="0" y="352" width="186" height="76" rx="18" class="card"/>
      <text x="18" y="382" class="tiny">NEXT PERIOD</text>
      <text x="18" y="410" class="muted">天后下次经期</text>
      <text x="137" y="415" class="big" font-size="50">7</text>
      <rect x="0" y="452" width="186" height="38" rx="19" class="accent"/>
      <text x="54" y="477" class="body" fill="#FFFFFF">记录详情</text>
    </g>
  </g>

  <!-- 日历 -->
  <g transform="translate(724 132)" filter="url(#shadow)">
    <rect width="250" height="560" rx="38" class="phone"/>
    <rect x="12" y="12" width="226" height="536" rx="30" class="screen"/>
    <rect x="90" y="24" width="70" height="7" rx="4" fill="#2E2A26" opacity="0.35"/>
    <g transform="translate(32 58)">
      <text class="meta">2026 年</text>
      <text y="44" class="title">5 月</text>
      <g transform="translate(0 82)">
        <text x="8" class="tiny">一</text><text x="37" class="tiny">二</text><text x="66" class="tiny">三</text><text x="95" class="tiny">四</text><text x="124" class="tiny">五</text><text x="153" class="tiny">六</text><text x="182" class="tiny">日</text>
        <g transform="translate(0 18)">
          <g class="muted">
            <text x="5" y="22">27</text><text x="34" y="22">28</text><text x="63" y="22">29</text><text x="92" y="22">30</text>
          </g>
          <text x="126" y="22" class="body">1</text><text x="155" y="22" class="body">2</text><text x="184" y="22" class="body">3</text>
          <rect x="0" y="36" width="25" height="25" rx="8" class="accent"/><text x="8" y="55" class="body" fill="#FFFFFF">4</text>
          <rect x="29" y="36" width="25" height="25" rx="8" class="accent"/><text x="37" y="55" class="body" fill="#FFFFFF">5</text>
          <rect x="58" y="36" width="25" height="25" rx="8" class="accent"/><text x="66" y="55" class="body" fill="#FFFFFF">6</text>
          <rect x="87" y="36" width="25" height="25" rx="8" class="accent"/><text x="95" y="55" class="body" fill="#FFFFFF">7</text>
          <text x="126" y="55" class="body">8</text><text x="155" y="55" class="body">9</text><text x="180" y="55" class="body">10</text>
          <text x="3" y="88" class="body">11</text><text x="32" y="88" class="body">12</text><text x="61" y="88" class="body">13</text>
          <text x="90" y="88" class="body">14</text><text x="119" y="88" class="body">15</text><text x="148" y="88" class="body">16</text><text x="177" y="88" class="body">17</text>
          <path d="M99 106 C96 99 87 101 87 109 C87 119 99 124 99 124 C99 124 112 119 112 109 C112 101 102 99 99 106Z" class="accentSoft" opacity="0.55"/>
          <text x="90" y="121" class="body">21</text>
          <text x="119" y="121" class="body">22</text><text x="148" y="121" class="body">23</text><text x="177" y="121" class="body">24</text>
          <circle cx="13" cy="146" r="13" fill="none" stroke="#C5634A" stroke-width="2" stroke-dasharray="5 4"/><text x="4" y="153" class="body">25</text>
          <circle cx="42" cy="146" r="13" fill="none" stroke="#C5634A" stroke-width="2" stroke-dasharray="5 4"/><text x="33" y="153" class="body">26</text>
          <circle cx="71" cy="146" r="13" fill="none" stroke="#C5634A" stroke-width="2" stroke-dasharray="5 4"/><text x="62" y="153" class="body">27</text>
        </g>
      </g>
      <rect x="0" y="302" width="186" height="78" rx="18" class="card"/>
      <text x="18" y="332" class="tiny">本月记录</text>
      <text x="18" y="358" class="body">🙂 轻微腹痛 · 已记录</text>
      <rect x="0" y="404" width="186" height="38" rx="19" class="accent" opacity="0.92"/>
      <text x="52" y="429" class="body" fill="#FFFFFF">查看记录</text>
    </g>
  </g>

  <!-- 记录 -->
  <g transform="translate(998 132)" filter="url(#shadow)">
    <rect width="250" height="560" rx="38" class="phone"/>
    <rect x="12" y="12" width="226" height="536" rx="30" class="screen"/>
    <rect x="90" y="24" width="70" height="7" rx="4" fill="#2E2A26" opacity="0.35"/>
    <g transform="translate(32 58)">
      <text class="meta">DAILY LOG</text>
      <text y="44" class="title">5 月 11 日</text>
      <rect x="0" y="78" width="186" height="70" rx="18" class="card"/>
      <text x="16" y="106" class="tiny">流量</text>
      <rect x="16" y="118" width="42" height="20" rx="10" fill="#F4D8CF"/><text x="27" y="133" class="tiny" fill="#C5634A">轻</text>
      <rect x="66" y="118" width="42" height="20" rx="10" class="accent"/><text x="77" y="133" class="tiny" fill="#FFFFFF">中</text>
      <rect x="116" y="118" width="42" height="20" rx="10" fill="#F1ECE3"/><text x="127" y="133" class="tiny">重</text>
      <rect x="0" y="164" width="186" height="96" rx="18" class="card"/>
      <text x="16" y="192" class="tiny">心情</text>
      <rect x="16" y="206" width="68" height="24" rx="12" class="accent"/><text x="26" y="223" class="tiny" fill="#FFFFFF">🙂 平静</text>
      <rect x="92" y="206" width="68" height="24" rx="12" fill="#F1ECE3"/><text x="102" y="223" class="tiny">😴 困倦</text>
      <rect x="16" y="234" width="68" height="24" rx="12" fill="#F1ECE3"/><text x="26" y="251" class="tiny">✨ 精力</text>
      <rect x="0" y="276" width="186" height="86" rx="18" class="card"/>
      <text x="16" y="304" class="tiny">症状</text>
      <rect x="16" y="318" width="56" height="24" rx="12" fill="#F1ECE3"/><text x="26" y="335" class="tiny">腹痛</text>
      <rect x="80" y="318" width="56" height="24" rx="12" class="accent"/><text x="90" y="335" class="tiny" fill="#FFFFFF">头痛</text>
      <rect x="0" y="388" width="186" height="48" rx="24" class="accent"/>
      <text x="76" y="419" class="body" fill="#FFFFFF">保存</text>
    </g>
  </g>

  <!-- 洞察 -->
  <g transform="translate(1272 132)" filter="url(#shadow)">
    <rect width="250" height="560" rx="38" class="phone"/>
    <rect x="12" y="12" width="226" height="536" rx="30" class="screen"/>
    <rect x="90" y="24" width="70" height="7" rx="4" fill="#2E2A26" opacity="0.35"/>
    <g transform="translate(32 58)">
      <text class="meta">INSIGHTS</text>
      <text y="44" class="title">周期洞察</text>
      <rect x="0" y="78" width="186" height="88" rx="18" class="accent"/>
      <text x="18" y="110" class="tiny" fill="#F7E8E1">平均周期</text>
      <text x="18" y="138" class="body" fill="#FDFBF7">你的周期规律</text>
      <text x="126" y="145" class="big" fill="#FDFBF7" font-size="54">28</text>
      <rect x="0" y="184" width="86" height="72" rx="18" class="card"/>
      <text x="14" y="212" class="tiny">平均经期</text>
      <text x="14" y="244" class="h2" fill="#B8794A">5 天</text>
      <rect x="100" y="184" width="86" height="72" rx="18" class="card"/>
      <text x="114" y="212" class="tiny">周期波动</text>
      <text x="114" y="244" class="h2" fill="#E8A48E">±2 天</text>
      <rect x="0" y="276" width="186" height="136" rx="18" class="card"/>
      <text x="16" y="304" class="tiny">周期长度</text>
      <rect x="24" y="370" width="18" height="24" rx="5" class="accent" opacity="0.55"/>
      <rect x="56" y="344" width="18" height="50" rx="5" class="accent" opacity="0.75"/>
      <rect x="88" y="330" width="18" height="64" rx="5" class="accent"/>
      <rect x="120" y="354" width="18" height="40" rx="5" class="accent" opacity="0.75"/>
      <rect x="152" y="338" width="18" height="56" rx="5" class="accent" opacity="0.9"/>
      <rect x="0" y="436" width="186" height="38" rx="19" class="accent"/>
      <text x="52" y="461" class="body" fill="#FFFFFF">开启提醒</text>
    </g>
  </g>
</svg>
